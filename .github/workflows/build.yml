name: Magisk Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'buildSrc/**'
      - 'gradle.properties'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'native/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and SDK packages
        run: |
          sdkmanager --install \
            "ndk;28.2.13676358" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Patch zlib for NDK r28 compatibility
        run: |
          echo 'ZEXTERN uLong ZEXPORT crc32_z(uLong crc, const Bytef *buf, z_size_t len);' \
            >> native/jni/external/zlib/zlib.h

      - name: Cache native build
        uses: actions/cache@v4
        with:
          path: |
            native/obj
            native/libs
          key: ${{ runner.os }}-native-${{ hashFiles('native/jni/**', 'native/jni/external/**') }}
          restore-keys: |
            ${{ runner.os }}-native-

      - name: Determine version
        id: version
        run: echo "SHORT_HASH=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      - name: Build native binaries
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          NDK_BIN="$SDK_ROOT/ndk/28.2.13676358/ndk-build"
          cd native
          "$NDK_BIN" \
            MAGISK_VERSION="${{ steps.version.outputs.SHORT_HASH }}" \
            MAGISK_VER_CODE=22105 MAGISK_DEBUG=1 \
            B_MAGISK=1 B_64BIT=1 B_INIT=1 B_POLICY=1 B_PROP=1 B_BOOT=1 -j$(nproc)

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle.properties', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: magisk-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: magisk-release
          path: app/build/outputs/apk/release/*.apk
