name: Magisk Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'native/**'
      - 'stub/**'
      - 'buildSrc/**'
      - 'build.py'
      - 'gradle.properties'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Magisk Manager
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v3
        with:
          path: /usr/local/lib/android/sdk/ndk/21.4.7075529
          key: ${{ runner.os }}-ndk-21.4.7075529

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release (Gradle)
        run: ./gradlew :app:assembleRelease

      - name: Build debug (Gradle)
        run: ./gradlew :app:assembleDebug

      # Sadece Magisk Manager APK'larını yükleyelim (stub'ları hariç tutalım)
      - name: Upload build artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: magisk-manager-${{ github.sha }}
          path: app/build/outputs/apk/*/*.apk
